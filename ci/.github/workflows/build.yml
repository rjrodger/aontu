# Dual-language build: a TypeScript matrix and a Go job.
#
# This is the intended .github/workflows/build.yml for the ts/ + go/
# layout. It lives under the top-level ci/ folder (copy ci/.github over
# the repo's .github) because updating .github/workflows/ directly
# requires the GitHub "workflow" OAuth scope.

name: build

on: ['push', 'pull_request']

jobs:
  build-ts:
    name: TypeScript
    timeout-minutes: 6
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: [24.x, latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: ts
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm install
      - run: npm run build
      - run: npm test

  build-go:
    name: Go
    timeout-minutes: 6
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...
