name: go-build

on: ['push']

jobs:
  build:
    timeout-minutes: 6

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        go-version: ['1.24.x', 'stable']

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        working-directory: go

    steps:
    - uses: actions/checkout@v4
    - name: Use Go ${{ matrix.go-version }}
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}
        cache-dependency-path: go/go.sum
    - name: Drop local replace directives
      run: go mod edit -dropreplace=github.com/jsonicjs/expr/go
    - run: go mod tidy
    - run: go build ./...
    - run: go test ./...
